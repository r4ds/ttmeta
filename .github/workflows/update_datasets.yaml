name: update-datasets

on:
  schedule:
    - cron: '0 14 * * 1' # 2pm UTC / 8am CST Mondays
  workflow_dispatch:

jobs:
  update-datasets:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/api2r/pkgskills-ci:release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: api2r/actions/install@v1
        with:
          use-container: "true"
          token: ${{ secrets.GITHUB_TOKEN }}
          extra-packages: any::gert, any::fs, any::here

      - name: Update data
        run: Rscript data-raw/just-new.R

      - name: 🚀 Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Auto-update internal data"
            git push
          fi
